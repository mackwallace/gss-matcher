<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Matches — GradSchoolShopper Personalized Match</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mint:  { DEFAULT: '#77C999', dark: '#4DAB7A', light: '#E8F7EF', deep: '#1A6641' },
            slate: { brand: '#3E455E', muted: '#6B7280', steel: '#A1B3C9', navy: '#2C3347' },
            ec:    { teal: '#2A9D8E', navy: '#1B3A5F' },
            surface: '#F7F9FC',
            border:  '#E2E6EC',
          },
          fontFamily: {
            heading: ['Rubik', 'sans-serif'],
            body:    ['Roboto', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Roboto', sans-serif; color: #3E455E; background: #fff; -webkit-font-smoothing: antialiased; margin: 0; }

    ::-webkit-scrollbar       { width: 5px; }
    ::-webkit-scrollbar-track { background: #F7F9FC; }
    ::-webkit-scrollbar-thumb { background: #CFD1D7; border-radius: 9999px; }

    /* ── Entrances ─────────────────── */
    @keyframes cardIn  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes heroIn  { from { opacity:0; transform:translateY(8px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes summIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .card-enter { opacity:0; animation:cardIn 420ms cubic-bezier(.22,1,.36,1) forwards; }
    .hero-in    { animation:heroIn 520ms cubic-bezier(.22,1,.36,1) both; }
    .summ-in    { opacity:0; animation:summIn 500ms cubic-bezier(.22,1,.36,1) 600ms forwards; }

    /* ── Match card ────────────────── */
    .match-card {
      background: #fff; border: 1.5px solid #E2E6EC; border-radius: 14px;
      overflow: hidden; position: relative;
      transition: box-shadow 220ms ease, border-color 220ms ease, transform 220ms ease;
    }
    .match-card::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
      border-radius:14px 0 0 14px; background:#77C999;
    }
    .match-card.rank-4::before,.match-card.rank-5::before { opacity:.55; }
    .match-card.rank-6::before,.match-card.rank-7::before { opacity:.28; }
    .match-card:hover { transform:translateY(-2px); border-color:#B8C4D0; box-shadow:0 8px 28px rgba(62,69,94,.09); }
    .match-card.top-card { box-shadow:0 4px 20px rgba(119,201,153,.16); border-color:rgba(119,201,153,.32); }
    .match-card.top-card:hover { box-shadow:0 10px 36px rgba(119,201,153,.20); }

    /* ── Selectivity badge ─────────── */
    .sel-badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:9999px; font-size:11px; font-weight:500; white-space:nowrap; }
    .sel-badge.high   { background:#FEF3C7; color:#92400E; }
    .sel-badge.sel    { background:#EEF2F7; color:#374151; }
    .sel-badge.mod    { background:#F3F4F6; color:#6B7280; }
    .sel-badge.access { background:#E8F7EF; color:#1A6641; }

    /* ── Stat pills ────────────────── */
    .stat-pill { display:inline-flex; align-items:baseline; gap:5px; padding:5px 12px; border-radius:8px; background:#F7F9FC; border:1px solid #E2E6EC; white-space:nowrap; }
    .stat-pill .pval { font-family:'Rubik',sans-serif; font-size:13px; font-weight:700; color:#1B3A5F; }
    .stat-pill .plbl { font-size:11px; color:#6B7280; }

    /* ── Specialty chips ───────────── */
    .spec-chip      { display:inline-flex; align-items:center; padding:3px 10px; border-radius:9999px; background:#E8F7EF; color:#1A6641; font-size:11.5px; font-weight:500; white-space:nowrap; }
    .spec-chip-more { display:inline-flex; align-items:center; padding:3px 10px; border-radius:9999px; background:#F7F9FC; color:#6B7280; border:1px solid #E2E6EC; font-size:11.5px; white-space:nowrap; }

    /* ── Why teaser ────────────────── */
    .why-teaser { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; font-size:13.5px; color:#3E455E; line-height:1.65; }

    /* ── Expand / collapse ─────────── */
    .card-details { max-height:0; overflow:hidden; transition:max-height 520ms cubic-bezier(.4,0,.2,1); }
    .card-details.open { max-height:1200px; }

    /* ── Score bars ────────────────── */
    .bar-track { height:7px; background:#E8F7EF; border-radius:4px; overflow:hidden; flex:1; }
    .bar-fill  { height:100%; background:linear-gradient(90deg,#77C999,#4DAB7A); border-radius:4px; width:0%; transition:width 550ms ease; }

    /* ── View Details btn ──────────── */
    .vd-btn { background:none; border:none; cursor:pointer; font-family:'Roboto',sans-serif; font-size:12.5px; font-weight:500; color:#4DAB7A; display:inline-flex; align-items:center; gap:4px; padding:0; transition:color 150ms; line-height:1; }
    .vd-btn:hover { color:#1A6641; }
    .vd-btn .chevron { transition:transform 260ms ease; display:flex; }
    .vd-btn.open .chevron { transform:rotate(180deg); }

    /* ── CTA buttons in expanded card ─ */
    .cta-primary {
      display:inline-flex; align-items:center; gap:7px;
      padding:11px 20px; border-radius:4px; background:#1B3A5F; color:#fff;
      font-family:'Rubik',sans-serif; font-size:13px; font-weight:600;
      text-decoration:none; transition:background 150ms ease, transform 150ms ease;
    }
    .cta-primary:hover { background:#2C3347; transform:translateY(-1px); }
    .cta-secondary {
      display:inline-flex; align-items:center; gap:6px;
      font-size:13px; font-weight:500; color:#2A9D8E; text-decoration:none;
      transition:color 150ms; padding:11px 0;
    }
    .cta-secondary:hover { color:#1B3A5F; }

    /* ── Section label (inside card) ─ */
    .sec-lbl { font-family:'Rubik',sans-serif; font-size:10.5px; font-weight:700; color:#1B3A5F; letter-spacing:.07em; text-transform:uppercase; margin-bottom:9px; }

    /* ── Info link (faculty/funding) ── */
    .info-link { color:#2A9D8E; text-decoration:none; font-weight:500; }
    .info-link:hover { text-decoration:underline; }

    /* ── Summary card ──────────────── */
    .summary-card {
      background:#fff; border:1.5px solid #D1EDE2; border-radius:14px; overflow:hidden; position:relative;
    }
    .summary-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:14px 0 0 14px; background:#77C999; }

    /* ── Footer ────────────────────── */
    .site-footer { padding: 0; }

    /* ── Hero dots ─────────────────── */
    .hero-dot { width:6px; height:6px; border-radius:9999px; background:#77C999; display:inline-block; }
  </style>
</head>

  /* ── Helpers ─────────────────────────────────────────────── */
  function toSlug(name) { return name.replace(/[^a-z0-9]/gi,'-').toLowerCase(); }

  function selectivity(pct) {
    var n = parseFloat(pct);
    if (isNaN(n))  return { label:'Not Listed',          cls:'mod'    };
    if (n < 8)     return { label:'Highly Selective',    cls:'high'   };
    if (n < 15)    return { label:'Selective',           cls:'sel'    };
    if (n < 22)    return { label:'Moderately Selective',cls:'mod'    };
    return                { label:'Accessible',          cls:'access' };
  }

  function qualLabel(key, val) {
    if (key === 'admissions_feasibility') {
      if (val >= 80) return { text:'Accessible',         color:'#4DAB7A' };
      if (val >= 65) return { text:'Competitive',        color:'#6B7280' };
      if (val >= 45) return { text:'Highly Competitive', color:'#D97706' };
      return               { text:'Most Selective',      color:'#6B7280' }; /* neutral gray, not red */
    }
    if (val >= 90) return { text:'Exceptional', color:'#4DAB7A' };
    if (val >= 80) return { text:'Very Strong',  color:'#77C999' };
    if (val >= 70) return { text:'Strong',       color:'#3E455E' };
    if (val >= 60) return { text:'Good',         color:'#6B7280' };
    return               { text:'Developing',   color:'#A1B3C9' };
  }

  function specChipsHTML(specs) {
    var show = specs.slice(0,3), extra = specs.length-3;
    var h = show.map(function(s){ return '<span class="spec-chip">'+s+'</span>'; }).join('');
    if (extra>0) h += '<span class="spec-chip-more">+'+extra+' more</span>';
    return h;
  }

      if (expandedCards[m.school_name]) {
        var det = document.getElementById('details-'+toSlug(m.school_name));
        if (det) setTimeout(function(){ animateBars(det); }, 50);
      }
    });
  }

  /* ── Toggle details ──────────────────────────────────────── */
  window.toggleDetails = function(s) {
    var schoolName = SLUG_MAP[s]; if (!schoolName) return;
    var isNowOpen = !expandedCards[schoolName];
    expandedCards[schoolName] = isNowOpen;
    var det=document.getElementById('details-'+s), btn=document.getElementById('vd-'+s);
    var span=btn&&btn.querySelector('.vd-text');
    if (det) det.classList.toggle('open', isNowOpen);
    if (btn) btn.classList.toggle('open', isNowOpen);
    if (span) span.textContent = isNowOpen?'Hide Details':'View Full Details';
    if (isNowOpen&&det) setTimeout(function(){ animateBars(det); }, 50);
  };

  /* ── Generate summary (GSS brand voice — neutral, structured) ─ */
  function generateSummary(results, formData) {
    var byResearch = results.slice().sort(function(a,b){ return b.score_breakdown.research_fit - a.score_breakdown.research_fit; });
    var byScore    = results.slice().sort(function(a,b){ return b.overall_score - a.overall_score; });
    var topMatch   = byScore[0];
    var topResearch = byResearch[0];

    /* Nearest deadline */
    /* Academic-year sort: Oct–Dec come first, then Jan–Jun (same application cycle) */
    var MONTH_ORDER = {Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12,Jan:13,Feb:14,Mar:15,Apr:16,May:17,Jun:18};
    var withDates = results.filter(function(m){ return m.application_deadline && !/multiple|varies/i.test(m.application_deadline); });
    withDates.sort(function(a,b){
      var pa=a.application_deadline.split(' '), pb=b.application_deadline.split(' ');
      return ((MONTH_ORDER[pa[0]]||13)*100+parseInt(pa[1]||0)) - ((MONTH_ORDER[pb[0]]||13)*100+parseInt(pb[1]||0));
    });
    var earliest = withDates[0];
    var dec15Count = results.filter(function(m){ return m.application_deadline==='Dec 15'; }).length;

    /* Acceptance range */
    var rates = results.map(function(m){ return parseFloat(m.acceptance_rate); }).filter(Boolean).sort(function(a,b){return a-b;});
    var mostSelectiveProg = results.find(function(m){ return parseFloat(m.acceptance_rate)===rates[0]; });
    var mostAccessProg    = results.find(function(m){ return parseFloat(m.acceptance_rate)===rates[rates.length-1]; });

    var interests = formData.research_interests.join(', ');
    var dn = function(m){ return m.abbr || m.school_name; };

    /* Intro paragraph */
    var para = formData.first_name+"'s research interests in "+interests+" align with "+results.length+" matched programs. "
      + "Across your matches, "+dn(topResearch)+" has the strongest research alignment. "
      + "Admissions selectivity ranges from "+mostSelectiveProg.acceptance_rate+" ("+dn(mostSelectiveProg)+") to "+mostAccessProg.acceptance_rate+" ("+dn(mostAccessProg)+").";

    /* Next steps */
    var steps = [];
    steps.push('<li style="margin-bottom:8px;"><strong>Start with '+dn(topMatch)+'</strong> — highest overall match score ('+topMatch.overall_score+'/100). Review the faculty directory and identify 1–2 advisors whose active research aligns with your interests before applying.</li>');

    if (earliest && earliest !== topMatch) {
      steps.push('<li style="margin-bottom:8px;">Your nearest application deadline is <strong>'+earliest.application_deadline+'</strong> ('+dn(earliest)+'). Prioritize materials for this program first.</li>');
    } else if (earliest) {
      steps.push('<li style="margin-bottom:8px;">Your top match at '+dn(topMatch)+' has a deadline of <strong>'+topMatch.application_deadline+'</strong>. Plan your application timeline around this date.</li>');
    }

    if (dec15Count >= 3) {
      steps.push('<li style="margin-bottom:8px;"><strong>'+dec15Count+' of your '+results.length+' matched programs</strong> share a December 15 deadline. Use this as your primary application cycle target date.</li>');
    }

    steps.push('<li style="margin-bottom:8px;">Contact graduate admissions at your top 2–3 programs to confirm <strong>funding availability and open research positions</strong> for the upcoming academic year.</li>');

    if (mostSelectiveProg && parseFloat(mostSelectiveProg.acceptance_rate) < 7) {
      steps.push('<li style="margin-bottom:8px;"><strong>'+dn(mostSelectiveProg)+'</strong> is the most selective program in your list at '+mostSelectiveProg.acceptance_rate+' acceptance. Ensure your application portfolio includes programs across the full selectivity range shown above.</li>');
    }

    return { para: para, steps: steps };
  }

  /* ── Render hero ─────────────────────────────────────────── */
  function renderHero() {
    var name = FORM_DATA.first_name;
    document.getElementById('page-heading').textContent =
      name ? name+', here are your physics programs — handpicked just for you.' : 'Here are your physics programs — handpicked just for you.';
    document.getElementById('page-subhead').textContent =
      'We evaluated over 113 physics graduate programs against your research interests, career goals, and academic profile. These are your personalized matches.';

    var interests = FORM_DATA.research_interests.join(' · ');
    document.getElementById('profile-snapshot').innerHTML = [
      '<svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="flex-shrink:0;color:#4DAB7A;margin-top:1px;"><circle cx="7.5" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 13c0-3.038 2.462-5.5 5.5-5.5S13 9.962 13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
      '<span style="font-size:12.5px;color:#3E455E;line-height:1.5;">',
        '<strong style="font-weight:600;color:#1B3A5F;">'+FORM_DATA.degree+'</strong>',
        '<span style="color:#D1EDE2;margin:0 7px;">·</span>',
        '<span style="color:#4DAB7A;">'+interests+'</span>',
        '<span style="color:#D1EDE2;margin:0 7px;">·</span>',
        '<span style="color:#6B7280;">'+FORM_DATA.career_goal+'</span>',
      '</span>'
    ].join('');
  }

  /* ── Render summary ──────────────────────────────────────── */
  function renderSummary(results) {
    var s = generateSummary(results, FORM_DATA);
    document.getElementById('summary-section').innerHTML = [
      '<div style="padding:22px 22px 22px 26px;">',
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">',
          '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;color:#77C999;"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
          '<span style="font-family:Rubik,sans-serif;font-size:10.5px;font-weight:700;color:#1B3A5F;letter-spacing:.07em;text-transform:uppercase;">Summary &amp; Next Steps</span>',
        '</div>',
        '<p style="font-size:13.5px;color:#3E455E;line-height:1.7;margin:0 0 16px;">'+s.para+'</p>',
        '<div style="font-family:Rubik,sans-serif;font-size:10.5px;font-weight:700;color:#1B3A5F;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;">Recommended Next Steps</div>',
        '<ol style="font-size:13.5px;color:#3E455E;line-height:1.65;margin:0;padding-left:18px;">',
          s.steps.join(''),
        '</ol>',
      '</div>'
    ].join('');
  }

  /* ── Init ────────────────────────────────────────────────── */
  /* ── Init ────────────────────────────────────────────────── */
  var WORKER_URL = 'https://gss-matcher-proxy.s-mackenzie-wallace.workers.dev';

  function renderDemoMode() {
    renderHero();
    var merged = RESULTS.map(mergeWithDisplay);
    merged.forEach(function(m){ SLUG_MAP[toSlug(m.school_name)] = m.school_name; });
    var sorted = merged.slice().sort(function(a,b){ return b.overall_score - a.overall_score; });
    renderCards(sorted);
    renderSummary(sorted);
  }

  window.addEventListener('load', function() {
    var params    = new URLSearchParams(window.location.search);
    var sessionId = params.get('session');

    if (!sessionId) {
      renderDemoMode(); // no session — show mock results
      return;
    }

    // Production: fetch real results from Worker
    fetch(WORKER_URL + '/results/' + sessionId)
      .then(function(r) { return r.json(); })
      .then(function(response) {
        if (response.status !== 'ready') { renderDemoMode(); return; }

        // Personalise hero with real student data if Worker preserved it
        var fd = response.form_data;
        if (fd && fd.first_name) {
          FORM_DATA.first_name          = fd.first_name;
          FORM_DATA.research_interests  = fd.research_interests  || FORM_DATA.research_interests;
          FORM_DATA.degree              = fd.degree              || FORM_DATA.degree;
          FORM_DATA.career_goal         = fd.career_goal         || FORM_DATA.career_goal;
        }

        renderHero();
        var matches = (response.data && response.data.matches) ? response.data.matches : [];
        var merged  = matches.map(mergeWithDisplay);
        merged.forEach(function(m){ SLUG_MAP[toSlug(m.school_name)] = m.school_name; });
        var sorted  = merged.slice().sort(function(a,b){ return b.overall_score - a.overall_score; });
        renderCards(sorted);
        renderSummary(sorted);
      })
      .catch(function(err) {
        console.error('Results fetch error:', err);
        renderDemoMode();
      });
  });

})();
</script>
</body>
</html>
